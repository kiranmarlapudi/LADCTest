<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leadership Archetype Survey</title>
  <!-- Google Font & modern backdrop -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 10% 30%, #f8faff, #d9e2f0);
      padding: 2rem 1rem;
    }

    .survey-wrapper {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 2.5rem;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 25px 50px -12px rgba(0, 20, 40, 0.30), 0 0 0 1px rgba(255, 255, 255, 0.6);
      transition: all 0.2s ease;
    }

    h1 {
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      color: #0b1e33;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .subhead {
      font-size: 1rem;
      color: #2c3e5c;
      border-left: 4px solid #3b7cff;
      padding-left: 1rem;
      margin-top: -0.2rem;
      margin-bottom: 2.2rem;
      font-weight: 450;
      background: rgba(59, 124, 255, 0.04);
      border-radius: 0 12px 12px 0;
      line-height: 1.5;
    }

    .field-name {
      margin-bottom: 2rem;
    }

    .field-name label {
      display: block;
      font-weight: 600;
      color: #0b1e33;
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
    }

    .field-name input {
      width: 100%;
      max-width: 380px;
      padding: 0.9rem 1.2rem;
      border: 1.5px solid #d9e2ef;
      border-radius: 40px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(2px);
      transition: 0.2s;
      outline: none;
      font-weight: 450;
      color: #0b1e33;
    }

    .field-name input:focus {
      border-color: #3b7cff;
      box-shadow: 0 0 0 4px rgba(59, 124, 255, 0.15);
      background: white;
    }

    .question-grid {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin: 2rem 0 2.5rem;
    }

    .question-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(2px);
      padding: 0.6rem 1.2rem 0.6rem 1.5rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      transition: 0.15s;
    }

    .question-item:hover {
      background: rgba(255, 255, 255, 0.75);
      border-color: #cbd8ec;
    }

    .q-text {
      flex: 1 1 220px;
      font-weight: 500;
      color: #13273f;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      padding-right: 0.5rem;
      line-height: 1.4;
    }

    .q-options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.1rem 0.1rem;
      justify-content: flex-end;
      flex: 2 1 380px;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 0.15rem;
      background: transparent;
      padding: 0.1rem 0.4rem;
      border-radius: 30px;
      transition: 0.1s;
      font-size: 0.78rem;
      font-weight: 500;
      color: #1f3857;
    }

    .option-item input[type="radio"] {
      appearance: none;
      width: 17px;
      height: 17px;
      border: 2px solid #b6c9e2;
      border-radius: 50%;
      margin: 0;
      background: white;
      transition: 0.15s;
      cursor: pointer;
      flex-shrink: 0;
    }

    .option-item input[type="radio"]:checked {
      border-color: #1a5cff;
      background: #1a5cff;
      box-shadow: inset 0 0 0 4px white, 0 0 0 1px #1a5cff;
    }

    .option-item input[type="radio"]:focus-visible {
      outline: 2px solid #1a5cff;
      outline-offset: 2px;
    }

    .option-item label {
      cursor: pointer;
      padding-right: 2px;
      color: #1f3857;
      font-weight: 450;
      font-size: 0.7rem;
    }

    .mandatory-star {
      color: #cc2e3b;
      margin-left: 4px;
      font-weight: 600;
    }

    .submit-area {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.8rem;
    }

    .btn-submit {
      background: #0b1e33;
      border: none;
      padding: 1rem 3.2rem;
      border-radius: 60px;
      color: white;
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 20px -6px rgba(11, 30, 51, 0.25);
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-submit:hover {
      background: #1a2f4a;
      transform: scale(1.01);
      box-shadow: 0 14px 28px -8px #0b1e3350;
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    /* result page */
    .result-page {
      display: none;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 2.8rem 2.5rem;
      border: 1px solid rgba(255,255,255,0.6);
      margin: 0.5rem 0;
      text-align: left;
    }

    .result-page.active {
      display: block;
    }

    .result-greeting {
      font-size: 2.2rem;
      font-weight: 600;
      color: #0b1e33;
      margin-bottom: 0.3rem;
      letter-spacing: -0.02em;
    }

    .result-primary {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0b1e33;
      margin: 1rem 0 1.8rem 0;
      padding: 0.6rem 1.2rem;
      background: linear-gradient(145deg, #edf3fc, #dce8f8);
      display: inline-block;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .result-primary span {
      background: linear-gradient(145deg, #1a3f6e, #0b1e33);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .indices-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem 2.5rem;
      margin: 1.8rem 0 0.5rem;
      background: rgba(255,255,255,0.3);
      padding: 1.5rem 2rem;
      border-radius: 2rem;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .index-item {
      font-size: 1.1rem;
      font-weight: 500;
      color: #0b1e33;
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .index-item .label {
      font-weight: 450;
      color: #1f3857;
    }

    .index-item .value {
      font-weight: 700;
      font-size: 1.3rem;
      color: #1a3f6e;
      background: rgba(255,255,255,0.4);
      padding: 0.1rem 0.8rem;
      border-radius: 40px;
    }

    .result-sub {
      margin-top: 1.8rem;
      color: #1f3857;
      font-weight: 450;
      opacity: 0.7;
      font-size: 0.95rem;
    }

    .back-link {
      margin-top: 1.8rem;
      display: inline-block;
      background: #eef4fc;
      padding: 0.6rem 2.2rem;
      border-radius: 40px;
      color: #0b1e33;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid #d3e0f0;
      transition: 0.15s;
    }

    .back-link:hover {
      background: #dce8f8;
    }

    /* hidden */
    .survey-content.hidden {
      display: none;
    }

    .error-msg {
      color: #b13e3e;
      background: #ffe9e9;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.95rem;
      display: inline-block;
      margin-top: 0.5rem;
      border: 1px solid #ffcdcd;
    }

    /* responsive */
    @media (max-width: 720px) {
      .survey-wrapper { padding: 1.8rem 1.2rem; }
      .question-item {
        border-radius: 28px;
        padding: 0.8rem 1rem;
        flex-direction: column;
        align-items: stretch;
      }
      .q-text { flex: 1 1 auto; margin-bottom: 0.4rem; font-size: 0.9rem; }
      .q-options { justify-content: center; gap: 0.1rem; }
      .option-item { padding: 0.1rem 0.2rem; font-size: 0.7rem; }
      .option-item input[type="radio"] { width: 16px; height: 16px; }
      .btn-submit { width: 100%; justify-content: center; padding: 1rem; }
      .result-greeting { font-size: 1.8rem; }
      .result-primary { font-size: 1.4rem; }
      .indices-grid { flex-direction: column; gap: 0.8rem; padding: 1.2rem; }
      .index-item { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="survey-wrapper" id="appContainer">
  <!-- SURVEY CONTENT -->
  <div class="survey-content" id="surveyContent">
    <h1>⚡ Leadership Archetype</h1>
    <div class="subhead">24 statements · 7-point scale · all fields required</div>

    <div class="field-name">
      <label for="respondentName">Your name <span class="mandatory-star">*</span></label>
      <input type="text" id="respondentName" placeholder="e.g. Alex Rivera" autocomplete="name">
    </div>

    <div class="question-grid" id="questionGrid"></div>

    <div class="submit-area">
      <button class="btn-submit" id="submitBtn">📊 See my archetype</button>
    </div>
    <div id="errorContainer" style="text-align: right; margin-top: 0.5rem;"></div>
  </div>

  <!-- RESULT PAGE -->
  <div class="result-page" id="resultPage">
    <div class="result-greeting" id="resultGreeting">Dear <span id="resultNameDisplay">—</span>,</div>
    <div class="result-primary">Your Primary Leadership Archetype is: <span id="resultPrimaryStyle">Transformational</span>.</div>

    <div class="indices-grid" id="indicesGrid">
      <div class="index-item"><span class="label">Autocratic/Authoritative:</span> <span class="value" id="indexAutocratic">0%</span></div>
      <div class="index-item"><span class="label">Democratic:</span> <span class="value" id="indexDemocratic">0%</span></div>
      <div class="index-item"><span class="label">Transformational:</span> <span class="value" id="indexTransformational">0%</span></div>
      <div class="index-item"><span class="label">Laissez-Faire:</span> <span class="value" id="indexLaissezFaire">0%</span></div>
    </div>

    <div class="result-sub">based on your responses · leadership tendency profile</div>
    <a href="#" class="back-link" id="backToSurvey">← retake survey</a>
  </div>
</div>

<script>
  (function() {
    // ---------- QUESTION BANK ----------
    const questions = [
      "I spend time coaching team members to achieve their potential.",
      "I monitor team performance closely to ensure compliance.",
      "I trust the team to manage their own deadlines.",
      "I encourage team members to vote on project strategies.",
      "I maintain frequent and supportive communication with my team members.",
      "I believe rewards and consequences are necessary to motivate team performance.",
      "I focus on inspiring the team with a grand vision.",
      "I let team members make decisions and solve problems on their own.",
      "I seek consensus from my team before launching a plan.",
      "I believe team members need close supervision to perform effectively.",
      "I encourage members to think outside the box and grow.",
      "I allow team members to evaluate the quality of their own work.",
      "I prefer assigning specific tasks to team without asking for input.",
      "I help team members take ownership of their responsibilities.",
      "I provide minimal direction to the team and intervene only when asked.",
      "I focus on inspiring my team with a grand vision.",
      "I believe most team members are capable of performing well when given responsibility.",
      "I believe the leader should make final decisions alone.",
      "I encourage my team members to think outside the box.",
      "I prefer staying out of the way while team members complete their work.",
      "I view myself as a facilitator rather than a boss.",
      "I spend time mentoring my team members to achieve their potential.",
      "I believe most team members need clear direction and guidance to do their work well.",
      "I believe team members generally prefer to work with minimal input from me."
    ];

    // ---------- RENDER ----------
    const grid = document.getElementById('questionGrid');
    const optionValues = [1,2,3,4,5,6,7];
    const labels = ['Strongly Disagree','Disagree','Slightly Disagree','Neutral','Slightly Agree','Agree','Strongly Agree'];

    questions.forEach((q, idx) => {
      const item = document.createElement('div');
      item.className = 'question-item';

      const qText = document.createElement('div');
      qText.className = 'q-text';
      qText.innerHTML = `${idx+1}. ${q} <span class="mandatory-star">*</span>`;

      const optionsDiv = document.createElement('div');
      optionsDiv.className = 'q-options';
      const nameAttr = `q${idx}`;

      for (let i = 0; i < optionValues.length; i++) {
        const val = optionValues[i];
        const opt = document.createElement('div');
        opt.className = 'option-item';

        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = nameAttr;
        radio.value = val;
        radio.id = `${nameAttr}_${val}`;

        const label = document.createElement('label');
        label.htmlFor = `${nameAttr}_${val}`;
        label.textContent = val; // show number

        opt.appendChild(radio);
        opt.appendChild(label);
        optionsDiv.appendChild(opt);
      }

      item.appendChild(qText);
      item.appendChild(optionsDiv);
      grid.appendChild(item);
    });

    // ---------- SCORING ----------
    function computeScores(answers) {
      // answers: array of 24 numbers (1-7)
      // Indices (0-based)
      // Autocratic/Authoritative: Q2,Q6,Q10,Q13,Q18,Q23 → indices 1,5,9,12,17,22
      const authIndices = [1,5,9,12,17,22];
      // Democratic (participative): Q4,Q8,Q9,Q21,Q3?  (Q3 trust, Q4 vote, Q8 decide, Q9 consensus, Q21 facilitator)
      // We'll use: Q4, Q8, Q9, Q21, Q3, Q12?  -> better: Q3, Q4, Q8, Q9, Q12, Q21
      const demoIndices = [2,3,7,8,11,20]; 
      // Transformational: Q1,Q5,Q7,Q11,Q14,Q16,Q19,Q22  (coaching, support, vision, outside box, ownership, mentoring)
      const transIndices = [0,4,6,10,13,15,18,21];
      // Laissez-Faire: Q15,Q20,Q24, Q12?  Q15 minimal direction, Q20 stay out, Q24 minimal input, Q12 evaluate own work
      const laissezIndices = [14,19,23,11]; // Q12 index11 added

      const avg = (indices) => {
        let sum = 0, count = 0;
        for (let i of indices) {
          if (answers[i] !== undefined) { sum += answers[i]; count++; }
        }
        return count > 0 ? sum / count : 0;
      };

      // raw averages (1-7)
      const authRaw = avg(authIndices);
      const demoRaw = avg(demoIndices);
      const transRaw = avg(transIndices);
      const laissezRaw = avg(laissezIndices);

      // convert to percentage: (raw-1)/6 * 100
      const toPct = (raw) => Math.round(((raw - 1) / 6) * 100);
      const authPct = toPct(authRaw);
      const demoPct = toPct(demoRaw);
      const transPct = toPct(transRaw);
      const laissezPct = toPct(laissezRaw);

      // primary: highest percentage, tie-break: Transformational > Democratic > Laissez > Autocratic
      const map = [
        { style: 'Transformational', pct: transPct },
        { style: 'Democratic', pct: demoPct },
        { style: 'Laissez-Faire', pct: laissezPct },
        { style: 'Autocratic/Authoritative', pct: authPct }
      ];
      map.sort((a,b) => b.pct - a.pct || (a.style === 'Transformational' ? -1 : 1));
      const primary = map[0].style;

      return {
        autocratic: authPct,
        democratic: demoPct,
        transformational: transPct,
        laissezFaire: laissezPct,
        primary: primary
      };
    }

    // ---------- SUBMIT ----------
    const submitBtn = document.getElementById('submitBtn');
    const errorContainer = document.getElementById('errorContainer');
    const surveyContent = document.getElementById('surveyContent');
    const resultPage = document.getElementById('resultPage');
    const resultNameDisplay = document.getElementById('resultNameDisplay');
    const resultPrimaryStyle = document.getElementById('resultPrimaryStyle');
    const indexAutocratic = document.getElementById('indexAutocratic');
    const indexDemocratic = document.getElementById('indexDemocratic');
    const indexTransformational = document.getElementById('indexTransformational');
    const indexLaissezFaire = document.getElementById('indexLaissezFaire');
    const backLink = document.getElementById('backToSurvey');

    function clearErrors() { errorContainer.innerHTML = ''; }
    function showError(msg) { errorContainer.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`; }

    function gatherAnswers() {
      const radios = document.querySelectorAll('.question-item input[type="radio"]');
      const answerMap = new Map();
      radios.forEach(r => { if (r.checked) answerMap.set(r.name, parseInt(r.value,10)); });

      const missing = [];
      for (let i = 0; i < 24; i++) {
        const name = `q${i}`;
        if (!answerMap.has(name)) missing.push(i+1);
      }
      if (missing.length > 0) {
        const qList = missing.map(n => `#${n}`).join(', ');
        showError(`Please answer all questions (missing: ${qList})`);
        return null;
      }

      const answers = [];
      for (let i = 0; i < 24; i++) answers.push(answerMap.get(`q${i}`));
      return answers;
    }

    function handleSubmit() {
      clearErrors();
      const nameInput = document.getElementById('respondentName');
      const name = nameInput.value.trim();
      if (!name) { showError('Please enter your name.'); return; }

      const answers = gatherAnswers();
      if (!answers) return;

      const scores = computeScores(answers);
      
      // update result page
      resultNameDisplay.textContent = name;
      resultPrimaryStyle.textContent = scores.primary;
      indexAutocratic.textContent = `${scores.autocratic}%`;
      indexDemocratic.textContent = `${scores.democratic}%`;
      indexTransformational.textContent = `${scores.transformational}%`;
      indexLaissezFaire.textContent = `${scores.laissezFaire}%`;

      surveyContent.classList.add('hidden');
      resultPage.classList.add('active');
    }

    submitBtn.addEventListener('click', handleSubmit);

    backLink.addEventListener('click', function(e) {
      e.preventDefault();
      surveyContent.classList.remove('hidden');
      resultPage.classList.remove('active');
      clearErrors();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('respondentName').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); submitBtn.click(); }
    });

    document.addEventListener('change', function(e) {
      if (e.target && e.target.type === 'radio') clearErrors();
    });

  })();
</script>
</body>
</html>
