<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leadership Style Survey</title>
  <!-- Google Font & modern backdrop -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 10% 30%, #f8faff, #d9e2f0);
      padding: 2rem 1rem;
    }

    .survey-wrapper {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 2.5rem;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 25px 50px -12px rgba(0, 20, 40, 0.30), 0 0 0 1px rgba(255, 255, 255, 0.6);
      transition: all 0.2s ease;
    }

    /* Logo */
    .logo-container {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .logo-container img {
      max-width: 220px;
      height: auto;
      border-radius: 12px;
      background: rgba(255,255,255,0.3);
      padding: 6px 12px;
      backdrop-filter: blur(2px);
    }

    h1 {
      font-weight: 700;
      font-size: 2.6rem;
      letter-spacing: -0.02em;
      color: #0b1e33;
      margin-bottom: 1.8rem;
      text-align: center;
    }

    .field-name {
      margin-bottom: 2rem;
    }

    .field-name label {
      display: block;
      font-weight: 600;
      color: #0b1e33;
      margin-bottom: 0.5rem;
      font-size: 1.2rem;
      letter-spacing: -0.01em;
    }

    .field-name input {
      width: 100%;
      max-width: 400px;
      padding: 1rem 1.4rem;
      border: 1.5px solid #d9e2ef;
      border-radius: 40px;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(2px);
      transition: 0.2s;
      outline: none;
      font-weight: 450;
      color: #0b1e33;
    }

    .field-name input:focus {
      border-color: #3b7cff;
      box-shadow: 0 0 0 4px rgba(59, 124, 255, 0.15);
      background: white;
    }

    /* Page navigation */
    .page-indicator {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }
    .page-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d0dcee;
      transition: 0.2s;
    }
    .page-dot.active {
      background: #1a5cff;
      width: 28px;
      border-radius: 20px;
    }

    .survey-page {
      display: none;
      animation: fadeIn 0.25s ease;
    }
    .survey-page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0.5; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .question-grid {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin: 1.5rem 0 2rem;
    }

    .question-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(2px);
      padding: 0.9rem 1.5rem 0.9rem 1.8rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      transition: 0.15s;
    }

    .question-item:hover {
      background: rgba(255, 255, 255, 0.8);
      border-color: #cbd8ec;
    }

    .q-text {
      flex: 1 1 220px;
      font-weight: 600;
      color: #0b1e33;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
      padding-right: 0.8rem;
      line-height: 1.4;
    }

    .q-options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem 0.1rem;
      justify-content: flex-end;
      flex: 2 1 400px;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      background: transparent;
      padding: 0.2rem 0.5rem;
      border-radius: 30px;
      transition: 0.1s;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1f3857;
    }

    .option-item input[type="radio"] {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid #b6c9e2;
      border-radius: 50%;
      margin: 0;
      background: white;
      transition: 0.15s;
      cursor: pointer;
      flex-shrink: 0;
    }

    .option-item input[type="radio"]:checked {
      border-color: #1a5cff;
      background: #1a5cff;
      box-shadow: inset 0 0 0 4px white, 0 0 0 1px #1a5cff;
    }

    .option-item input[type="radio"]:focus-visible {
      outline: 2px solid #1a5cff;
      outline-offset: 2px;
    }

    .option-item label {
      cursor: pointer;
      padding-right: 3px;
      color: #1f3857;
      font-weight: 500;
      font-size: 0.85rem;
    }

    .option-label {
      font-size: 0.75rem;
      font-weight: 400;
      color: #4a6582;
      margin-left: 2px;
    }

    .mandatory-star {
      color: #cc2e3b;
      margin-left: 4px;
      font-weight: 600;
    }

    .nav-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      gap: 1rem;
    }

    .btn-nav {
      background: #eef4fc;
      border: 1px solid #d3e0f0;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      color: #0b1e33;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .btn-nav:hover {
      background: #dce8f8;
    }

    .btn-submit {
      background: #0b1e33;
      border: none;
      padding: 0.9rem 2.8rem;
      border-radius: 60px;
      color: white;
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 20px -6px rgba(11, 30, 51, 0.25);
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: 'Inter', sans-serif;
    }

    .btn-submit:hover {
      background: #1a2f4a;
      transform: scale(1.01);
      box-shadow: 0 14px 28px -8px #0b1e3350;
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    /* result page */
    .result-page {
      display: none;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 2.8rem 2.5rem;
      border: 1px solid rgba(255,255,255,0.6);
      margin: 0.5rem 0;
      text-align: left;
    }

    .result-page.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .result-greeting {
      font-size: 2.4rem;
      font-weight: 600;
      color: #0b1e33;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .result-primary {
      font-size: 2rem;
      font-weight: 700;
      color: #0b1e33;
      margin: 1.2rem 0 2rem 0;
      padding: 0.8rem 1.5rem;
      background: linear-gradient(145deg, #edf3fc, #dce8f8);
      display: inline-block;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .result-primary span {
      background: linear-gradient(145deg, #1a3f6e, #0b1e33);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-sub {
      font-size: 1.1rem;
      color: #1f3857;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    .indices-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.5rem 0 1rem;
      background: rgba(255,255,255,0.3);
      padding: 1.8rem 2.2rem;
      border-radius: 2rem;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .index-item {
      font-size: 1.3rem;
      font-weight: 500;
      color: #0b1e33;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .index-item .label {
      font-weight: 450;
      color: #1f3857;
      min-width: 180px;
    }

    .index-item .value {
      font-weight: 700;
      font-size: 1.5rem;
      color: #1a3f6e;
      background: rgba(255,255,255,0.4);
      padding: 0.1rem 1rem;
      border-radius: 40px;
    }

    .index-item.highlight {
      background: rgba(26, 92, 255, 0.08);
      border-radius: 12px;
      padding: 0.3rem 0.8rem;
      margin: 0 -0.8rem;
    }

    .error-msg {
      color: #b13e3e;
      background: #ffe9e9;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 1rem;
      display: inline-block;
      margin-top: 0.5rem;
      border: 1px solid #ffcdcd;
    }

    /* hidden */
    .survey-content.hidden {
      display: none;
    }

    /* responsive */
    @media (max-width: 820px) {
      .survey-wrapper { padding: 1.8rem 1.2rem; }
      .question-item {
        border-radius: 28px;
        padding: 1rem 1.2rem;
        flex-direction: column;
        align-items: stretch;
      }
      .q-text { flex: 1 1 auto; margin-bottom: 0.6rem; font-size: 1rem; }
      .q-options { justify-content: center; gap: 0.2rem; }
      .option-item { padding: 0.1rem 0.3rem; }
      .option-item input[type="radio"] { width: 18px; height: 18px; }
      .btn-submit { width: 100%; justify-content: center; }
      .nav-area { flex-wrap: wrap; justify-content: center; }
      .result-greeting { font-size: 2rem; }
      .result-primary { font-size: 1.6rem; }
      .indices-list { padding: 1.2rem; }
      .index-item { font-size: 1.1rem; }
      .index-item .value { font-size: 1.2rem; }
      .logo-container img { max-width: 160px; }
    }

    @media (max-width: 480px) {
      .option-item label { font-size: 0.75rem; }
      .option-item { padding: 0.1rem 0.2rem; }
      .q-text { font-size: 0.95rem; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div class="survey-wrapper" id="appContainer">
  <!-- LOGO -->
  <div class="logo-container">
    <img src="https://github.com/kiranmarlapudi/LADCTest/blob/main/tapmi-bengaluru-2024-logo.png?raw=true" alt="Tapmi Bengaluru Logo">
  </div>

  <!-- SURVEY CONTENT -->
  <div class="survey-content" id="surveyContent">
    <h1>Leadership Style</h1>

    <div class="field-name">
      <label for="respondentName">Your name <span class="mandatory-star">*</span></label>
      <input type="text" id="respondentName" placeholder="e.g. Alex Rivera" autocomplete="name">
    </div>

    <!-- Page dots -->
    <div class="page-indicator">
      <span class="page-dot active" data-page="0"></span>
      <span class="page-dot" data-page="1"></span>
    </div>

    <!-- Page 1 (questions 1-12) -->
    <div class="survey-page active" data-page="0">
      <div class="question-grid" id="page1Grid"></div>
      <div class="nav-area">
        <span></span>
        <button class="btn-nav" id="nextPageBtn">Next →</button>
      </div>
    </div>

    <!-- Page 2 (questions 13-24) -->
    <div class="survey-page" data-page="1">
      <div class="question-grid" id="page2Grid"></div>
      <div class="nav-area">
        <button class="btn-nav" id="prevPageBtn">← Back</button>
        <button class="btn-submit" id="submitBtn">View my leadership style</button>
      </div>
    </div>

    <div id="errorContainer" style="text-align: center; margin-top: 0.5rem;"></div>
  </div>

  <!-- RESULT PAGE -->
  <div class="result-page" id="resultPage">
    <div class="result-greeting">Dear <span id="resultNameDisplay">—</span>,</div>
    <div class="result-primary">Your Primary Leadership Archetype is: <span id="resultPrimaryStyle">Transformational</span>.</div>
    <div class="result-sub" id="resultSubText"></div>

    <div class="indices-list" id="indicesList">
      <div class="index-item" id="indexAutocraticItem"><span class="label">Autocratic/Authoritative:</span> <span class="value" id="indexAutocratic">0%</span></div>
      <div class="index-item" id="indexDemocraticItem"><span class="label">Democratic:</span> <span class="value" id="indexDemocratic">0%</span></div>
      <div class="index-item" id="indexTransformationalItem"><span class="label">Transformational:</span> <span class="value" id="indexTransformational">0%</span></div>
      <div class="index-item" id="indexLaissezFaireItem"><span class="label">Laissez-Faire:</span> <span class="value" id="indexLaissezFaire">0%</span></div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- QUESTION BANK (24) ----------
    const questions = [
      "I spend time coaching team members to achieve their potential.",
      "I monitor team performance closely to ensure compliance.",
      "I trust the team to manage their own deadlines.",
      "I encourage team members to vote on project strategies.",
      "I maintain frequent and supportive communication with my team members.",
      "I believe rewards and consequences are necessary to motivate team performance.",
      "I focus on inspiring the team with a grand vision.",
      "I let team members make decisions and solve problems on their own.",
      "I seek consensus from my team before launching a plan.",
      "I believe team members need close supervision to perform effectively.",
      "I encourage members to think outside the box and grow.",
      "I allow team members to evaluate the quality of their own work.",
      "I prefer assigning specific tasks to team without asking for input.",
      "I help team members take ownership of their responsibilities.",
      "I provide minimal direction to the team and intervene only when asked.",
      "I focus on inspiring my team with a grand vision.",
      "I believe most team members are capable of performing well when given responsibility.",
      "I believe the leader should make final decisions alone.",
      "I encourage my team members to think outside the box.",
      "I prefer staying out of the way while team members complete their work.",
      "I view myself as a facilitator rather than a boss.",
      "I spend time mentoring my team members to achieve their potential.",
      "I believe most team members need clear direction and guidance to do their work well.",
      "I believe team members generally prefer to work with minimal input from me."
    ];

    // ---------- RENDER PAGES ----------
    const page1Grid = document.getElementById('page1Grid');
    const page2Grid = document.getElementById('page2Grid');

    const optionValues = [1,2,3,4,5,6,7];
    const shortLabels = ['1<br><span class="option-label">Strongly<br>Disagree</span>', 
                         '2<br><span class="option-label">Disagree</span>',
                         '3<br><span class="option-label">Slightly<br>Disagree</span>',
                         '4<br><span class="option-label">Neutral</span>',
                         '5<br><span class="option-label">Slightly<br>Agree</span>',
                         '6<br><span class="option-label">Agree</span>',
                         '7<br><span class="option-label">Strongly<br>Agree</span>'];

    function renderQuestions(startIdx, endIdx, container) {
      for (let idx = startIdx; idx < endIdx; idx++) {
        const q = questions[idx];
        const item = document.createElement('div');
        item.className = 'question-item';

        const qText = document.createElement('div');
        qText.className = 'q-text';
        qText.innerHTML = `${idx+1}. ${q} <span class="mandatory-star">*</span>`;

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'q-options';
        const nameAttr = `q${idx}`;

        for (let i = 0; i < optionValues.length; i++) {
          const val = optionValues[i];
          const opt = document.createElement('div');
          opt.className = 'option-item';

          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = nameAttr;
          radio.value = val;
          radio.id = `${nameAttr}_${val}`;

          const label = document.createElement('label');
          label.htmlFor = `${nameAttr}_${val}`;
          label.innerHTML = shortLabels[i];

          opt.appendChild(radio);
          opt.appendChild(label);
          optionsDiv.appendChild(opt);
        }

        item.appendChild(qText);
        item.appendChild(optionsDiv);
        container.appendChild(item);
      }
    }

    renderQuestions(0, 12, page1Grid);
    renderQuestions(12, 24, page2Grid);

    // ---------- PAGE NAVIGATION ----------
    const pages = document.querySelectorAll('.survey-page');
    const dots = document.querySelectorAll('.page-dot');
    let currentPage = 0;

    function showPage(index) {
      pages.forEach((p, i) => p.classList.toggle('active', i === index));
      dots.forEach((d, i) => d.classList.toggle('active', i === index));
      currentPage = index;
      clearErrors();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('nextPageBtn').addEventListener('click', function() {
      if (currentPage === 0) showPage(1);
    });
    document.getElementById('prevPageBtn').addEventListener('click', function() {
      if (currentPage === 1) showPage(0);
    });

    // ---------- IMPROVED SCORING WITH TIE-BREAKING ----------
    function computeScores(answers) {
      const authIndices = [1,5,9,12,17,22];
      const demoIndices = [3,4,8,13,16,20];
      const laissezIndices = [2,7,11,14,19,23];
      const transIndices = [0,6,10,15,18,21];

      const avg = (indices) => {
        let sum = 0, count = 0;
        for (let i of indices) {
          if (answers[i] !== undefined) { sum += answers[i]; count++; }
        }
        return count > 0 ? sum / count : 0;
      };

      const authRaw = avg(authIndices);
      const demoRaw = avg(demoIndices);
      const laissezRaw = avg(laissezIndices);
      const transRaw = avg(transIndices);

      // Convert to percentage
      const toPct = (raw) => Math.round((raw / 7) * 100);
      const authPct = toPct(authRaw);
      const demoPct = toPct(demoRaw);
      const laissezPct = toPct(laissezRaw);
      const transPct = toPct(transRaw);

      // Store raw scores for tie-breaking
      const styles = [
        { name: 'Transformational', pct: transPct, raw: transRaw },
        { name: 'Democratic', pct: demoPct, raw: demoRaw },
        { name: 'Laissez-Faire', pct: laissezPct, raw: laissezRaw },
        { name: 'Autocratic/Authoritative', pct: authPct, raw: authRaw }
      ];

      // Sort by percentage (descending), then by raw score (descending) for tie-breaking
      styles.sort((a, b) => {
        if (b.pct !== a.pct) return b.pct - a.pct;
        return b.raw - a.raw; // higher raw score wins ties
      });

      // Check if there's a tie (within 2 percentage points)
      const topTwo = styles.slice(0, 2);
      const isTie = Math.abs(topTwo[0].pct - topTwo[1].pct) <= 2;

      let primary = styles[0].name;
      let subText = '';

      if (isTie && topTwo[0].pct === topTwo[1].pct) {
        // Exact tie - use raw score to break
        if (topTwo[0].raw === topTwo[1].raw) {
          // Still tied - check third
          const topThree = styles.slice(0, 3);
          if (topThree[0].pct === topThree[2].pct && topThree[0].raw === topThree[2].raw) {
            primary = 'Mixed (Multiple Styles)';
            subText = 'You show an equal balance across multiple leadership styles.';
          } else {
            primary = `${topTwo[0].name} & ${topTwo[1].name}`;
            subText = `You show a balanced blend of ${topTwo[0].name} and ${topTwo[1].name} leadership styles.`;
          }
        } else {
          // Raw score breaks the tie
          primary = styles[0].name;
          subText = `You show a slightly stronger tendency toward ${styles[0].name} over ${styles[1].name}.`;
        }
      } else if (isTie) {
        // Close tie (within 2%)
        primary = `${topTwo[0].name} (Primary)`;
        subText = `You show strong ${topTwo[0].name} tendencies with notable ${topTwo[1].name} influence.`;
      } else {
        // Clear winner
        const diff = topTwo[0].pct - topTwo[1].pct;
        if (diff > 15) {
          subText = `You have a strong, clear preference for ${topTwo[0].name} leadership.`;
        } else {
          subText = `You show a preference for ${topTwo[0].name} leadership with some ${topTwo[1].name} influence.`;
        }
      }

      return {
        autocratic: authPct,
        democratic: demoPct,
        transformational: transPct,
        laissezFaire: laissezPct,
        primary: primary,
        subText: subText,
        isTie: isTie,
        rawScores: { authRaw, demoRaw, laissezRaw, transRaw }
      };
    }

    // ---------- SUBMIT ----------
    const submitBtn = document.getElementById('submitBtn');
    const errorContainer = document.getElementById('errorContainer');
    const surveyContent = document.getElementById('surveyContent');
    const resultPage = document.getElementById('resultPage');
    const resultNameDisplay = document.getElementById('resultNameDisplay');
    const resultPrimaryStyle = document.getElementById('resultPrimaryStyle');
    const resultSubText = document.getElementById('resultSubText');
    const indexAutocratic = document.getElementById('indexAutocratic');
    const indexDemocratic = document.getElementById('indexDemocratic');
    const indexTransformational = document.getElementById('indexTransformational');
    const indexLaissezFaire = document.getElementById('indexLaissezFaire');
    const indexAutocraticItem = document.getElementById('indexAutocraticItem');
    const indexDemocraticItem = document.getElementById('indexDemocraticItem');
    const indexTransformationalItem = document.getElementById('indexTransformationalItem');
    const indexLaissezFaireItem = document.getElementById('indexLaissezFaireItem');

    function clearErrors() { errorContainer.innerHTML = ''; }
    function showError(msg) { errorContainer.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`; }

    function gatherAnswers() {
      const radios = document.querySelectorAll('.question-item input[type="radio"]');
      const answerMap = new Map();
      radios.forEach(r => { if (r.checked) answerMap.set(r.name, parseInt(r.value,10)); });

      const missing = [];
      for (let i = 0; i < 24; i++) {
        const name = `q${i}`;
        if (!answerMap.has(name)) missing.push(i+1);
      }
      if (missing.length > 0) {
        const qList = missing.map(n => `#${n}`).join(', ');
        showError(`Please answer all questions (missing: ${qList})`);
        return null;
      }

      const answers = [];
      for (let i = 0; i < 24; i++) answers.push(answerMap.get(`q${i}`));
      return answers;
    }

    function handleSubmit() {
      clearErrors();
      const nameInput = document.getElementById('respondentName');
      const name = nameInput.value.trim();
      if (!name) { showError('Please enter your name.'); return; }

      const answers = gatherAnswers();
      if (!answers) return;

      const scores = computeScores(answers);
      
      resultNameDisplay.textContent = name;
      resultPrimaryStyle.textContent = scores.primary;
      resultSubText.textContent = scores.subText;
      
      indexAutocratic.textContent = `${scores.autocratic}%`;
      indexDemocratic.textContent = `${scores.democratic}%`;
      indexTransformational.textContent = `${scores.transformational}%`;
      indexLaissezFaire.textContent = `${scores.laissezFaire}%`;

      // Highlight the primary style(s)
      [indexAutocraticItem, indexDemocraticItem, indexTransformationalItem, indexLaissezFaireItem].forEach(el => {
        el.classList.remove('highlight');
      });
      
      const primaryLower = scores.primary.toLowerCase();
      if (primaryLower.includes('autocratic')) indexAutocraticItem.classList.add('highlight');
      if (primaryLower.includes('democratic')) indexDemocraticItem.classList.add('highlight');
      if (primaryLower.includes('transformational')) indexTransformationalItem.classList.add('highlight');
      if (primaryLower.includes('laissez')) indexLaissezFaireItem.classList.add('highlight');
      
      // If multiple styles are mentioned (e.g., "Transformational & Democratic")
      if (scores.primary.includes('&')) {
        const styles = scores.primary.split('&').map(s => s.trim().toLowerCase());
        styles.forEach(style => {
          if (style.includes('autocratic')) indexAutocraticItem.classList.add('highlight');
          if (style.includes('democratic')) indexDemocraticItem.classList.add('highlight');
          if (style.includes('transformational')) indexTransformationalItem.classList.add('highlight');
          if (style.includes('laissez')) indexLaissezFaireItem.classList.add('highlight');
        });
      }

      surveyContent.classList.add('hidden');
      resultPage.classList.add('active');
    }

    submitBtn.addEventListener('click', handleSubmit);

    // Enter key on name field triggers submit if on page 2
    document.getElementById('respondentName').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        if (currentPage === 1) {
          e.preventDefault();
          submitBtn.click();
        } else {
          e.preventDefault();
          showPage(1);
        }
      }
    });

    document.addEventListener('change', function(e) {
      if (e.target && e.target.type === 'radio') clearErrors();
    });

  })();
</script>
</body>
</html>
