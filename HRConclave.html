<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Conclave 2026 Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;
overflow:hidden;

font-family:'Segoe UI',sans-serif;

background:

radial-gradient(circle at top left,
rgba(139,92,246,.25),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(56,189,248,.20),
transparent 35%),

linear-gradient(
135deg,
#12081f,
#251341,
#102442
);

color:white;

}


/* HEADER */

.header{

text-align:center;

padding:15px;

}


.logo{

width:130px;
height:130px;

object-fit:contain;

margin:auto;

}


.title{

font-size:58px;

font-weight:800;

letter-spacing:3px;

margin-top:5px;

}


.team{

font-size:46px;

font-weight:700;

margin-top:10px;

}


.live{

color:#4ade80;

margin-top:8px;

font-size:14px;

}


.dot{

height:10px;
width:10px;

background:#4ade80;

display:inline-block;

border-radius:50%;

margin-right:8px;

}


/* SCORE */

.total{

text-align:center;

margin:10px;

}


.total-label{

opacity:.7;

font-size:14px;

}


.total-score{

font-size:42px;

font-weight:700;

color:#fbbf24;

}



/* MAIN */

.main{

display:flex;

justify-content:center;

align-items:center;

gap:25px;

width:98%;

margin:auto;

}



.side{

width:230px;

}



.side img{

width:100%;

height:500px;

object-fit:contain;

}



.chart-box{

height:560px;

flex:1;

background:
rgba(255,255,255,.05);

border-radius:25px;

padding:25px;

border:
1px solid rgba(255,255,255,.1);

}



canvas{

height:100%!important;
width:100%!important;

}



/* FINAL */

.leaderboard{
width:90%;
max-width:1200px;
margin:20px auto;
}

.first{
background:
linear-gradient(
135deg,
#fbbf24,
#f59e0b
);

color:#111;

padding:40px;

margin-bottom:25px;

border-radius:30px;
}

.podium-row{
display:flex;
gap:25px;
}

.second{
flex:1;

background:
linear-gradient(
135deg,
#cbd5e1,
#94a3b8
);

color:#111;

border-radius:30px;
}

.third{
flex:1;

background:
linear-gradient(
135deg,
#d97706,
#92400e
);

border-radius:30px;
}

.winner-card{
padding:35px;
text-align:center;
}

.position{
font-size:34px;
font-weight:800;
}

.team-name-final{
font-size:52px;
font-weight:800;
margin-top:15px;
}

.team-score-final{
font-size:88px;
font-weight:900;
margin-top:15px;
}


.footer{

position:fixed;

bottom:12px;

left:15px;

font-size:13px;

z-index:9999;

}

.footer a{

color:#c4b5fd;

text-decoration:none;

margin:0 6px;

font-weight:600;

transition:.2s;

}

.footer a:hover{

color:#ffffff;

text-shadow:
0 0 10px rgba(255,255,255,.6);

}



</style>

</head>


<body>


<div class="header">


<img id="logo"
class="logo">


<div class="title">
HR CONCLAVE 2026
</div>


<div id="teamName"
class="team">
TEAM 1
</div>


<div class="live">

<span class="dot"></span>

LIVE DASHBOARD

</div>


</div>



<div id="totalArea"
class="total">


<div class="total-label">
TOTAL SCORE
</div>


<div id="totalScore"
class="total-score">
0
</div>


</div>





<div id="normalView"
class="main">


<div class="side">

<img id="leftImage">

</div>


<div class="chart-box">

<canvas id="chart"></canvas>

</div>


<div class="side">

<img id="rightImage">

</div>


</div>





<div id="finalView"
style="display:none">


<div class="leaderboard"
id="leaderboard">

</div>


</div>




<div class="footer">

<a href="?team=1">Team 1</a>

|

<a href="?team=2">Team 2</a>

|

<a href="?team=3">Team 3</a>

|

<a href="?final=true">🏆 Final Scores</a>

</div>





<script>


/* ======================
   SETTINGS
====================== */


const SHEET_ID =
"1zfoi-RiQ2_djE64bg3DMQXD7KBaz0j8ko54tPrQ9nf8";



const EVENT_LOGO =
"https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/tapmi-bengaluru-2024-logo.png";


const LEFT_IMAGE =
"https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/tapmi-bengaluru-2024-logo.png";


const RIGHT_IMAGE =
"https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/tapmi-bengaluru-2024-logo.png";



document.getElementById("logo").src =
EVENT_LOGO;



document.getElementById("leftImage").src =
LEFT_IMAGE;



document.getElementById("rightImage").src =
RIGHT_IMAGE;



const params =
new URLSearchParams(
window.location.search
);



const isFinal =
params.get("final")==="true";
const currentTeam =
params.get("team");

window.addEventListener("load",()=>{

document.querySelectorAll(".footer a")
.forEach(link=>{

const href = link.getAttribute("href");

if(
(currentTeam==="1" && href.includes("team=1")) ||
(currentTeam==="2" && href.includes("team=2")) ||
(currentTeam==="3" && href.includes("team=3")) ||
(isFinal && href.includes("final=true"))
){
link.style.color="#fbbf24";
}
});

});


const selectedTeam =
params.get("team") || "1";



let chart;



/* ======================
 TEAM VIEW
====================== */


async function loadTeam(){


const sheetName =
"Team " + selectedTeam;



const url =

`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;



try{

const response =
await fetch(
url+"&t="+Date.now()
);



const csv =
await response.text();



const rows =
csv.trim()
.split("\n")
.map(r=>
r.split(",")
.map(c=>c.replace(/"/g,"").trim())
);



// Find the row containing "Pillar" or "Category" to locate the data
let startRow = -1;
for(let i = 0; i < rows.length; i++){
    if(rows[i][0] && (rows[i][0].includes("Pillar") || rows[i][0].includes("Category") || rows[i][0].includes("Parameter"))){
        startRow = i + 1; // Start from next row
        break;
    }
}

// If no header found, use default rows 10-15
if(startRow === -1){
    startRow = 10;
}

// Get data rows (5 rows of data)
const data = [];
const labels = [];
const scores = [];

for(let i = startRow; i < Math.min(startRow + 5, rows.length); i++){
    if(rows[i] && rows[i].length > 12){
        const label = rows[i][11] ? rows[i][11].trim() : `Item ${i - startRow + 1}`;
        const score = Number(rows[i][12]) || 0;
        
        // Only add if label is not empty
        if(label && label !== ""){
            labels.push(label);
            scores.push(score);
            data.push(rows[i]);
        }
    }
}

// If no data found, try to find any numeric data in column 13 (index 12)
if(labels.length === 0){
    for(let i = 0; i < rows.length; i++){
        if(rows[i] && rows[i].length > 12){
            const score = Number(rows[i][12]);
            if(!isNaN(score) && score > 0){
                const label = rows[i][11] ? rows[i][11].trim() : `Item ${labels.length + 1}`;
                if(label && label !== ""){
                    labels.push(label);
                    scores.push(score);
                }
                if(labels.length >= 5) break;
            }
        }
    }
}

// If still no data, use fallback
if(labels.length === 0){
    // Use default labels
    const defaultLabels = ["Pillar 1", "Pillar 2", "Pillar 3", "Pillar 4", "Pillar 5"];
    for(let i = 0; i < 5; i++){
        labels.push(defaultLabels[i]);
        scores.push(0);
    }
}

const total =
scores.reduce((a,b)=>a+b,0);



document.getElementById("teamName")
.innerHTML =
"TEAM "+selectedTeam;



document.getElementById("totalScore")
.innerHTML =
total;



drawChart(labels,scores);

}
catch(err){
    console.error("Error loading team data:", err);
    // Show error state
    document.getElementById("teamName").innerHTML = "TEAM "+selectedTeam+" (Error loading)";
    document.getElementById("totalScore").innerHTML = "0";
    
    // Show fallback chart
    const fallbackLabels = ["Pillar 1", "Pillar 2", "Pillar 3", "Pillar 4", "Pillar 5"];
    drawChart(fallbackLabels, [0,0,0,0,0]);
}




}




function drawChart(labels,scores){


if(chart)
chart.destroy();



chart =
new Chart(
document.getElementById("chart"),
{

type:"bar",

data:{


labels,


datasets:[{

data:scores,


backgroundColor:[

"#8b5cf6",
"#38bdf8",
"#f472b6",
"#34d399",
"#fbbf24"

],


borderRadius:18

}]

},



options:{


responsive:true,

maintainAspectRatio:false,


plugins:{


legend:{
display:false
},

tooltip:{
    callbacks: {
        label: function(context) {
            return context.parsed.y + ' points';
        }
    }
}

},


scales:{


x:{


ticks:{
color:"#fff",
font:{
size:15
}
},

grid:{
display:false
}


},


y:{


beginAtZero:true,

max:Math.max(100, ...scores) + 10,


ticks:{
color:"#fff"
}


}


}


}


});



}



/* ======================
 FINAL PAGE - DYNAMIC
====================== */


async function showFinal(){

document.getElementById("normalView")
.style.display="none";

document.getElementById("totalArea")
.style.display="none";

document.getElementById("finalView")
.style.display="block";

document.getElementById("teamName")
.innerHTML =
"🏆 FINAL LEADERBOARD";

const teams = [
"Team 1",
"Team 2",
"Team 3"
];

const results = [];

for(const teamName of teams){

try{

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(teamName)}`;

const response =
await fetch(url + "&t=" + Date.now());

const csv =
await response.text();

const rows =
csv.trim()
.split("\n")
.map(r =>
r.split(",")
.map(c =>
c.replace(/"/g,"").trim()
)
);

// Find the data using the same logic as loadTeam
let startRow = -1;
for(let i = 0; i < rows.length; i++){
    if(rows[i][0] && (rows[i][0].includes("Pillar") || rows[i][0].includes("Category") || rows[i][0].includes("Parameter"))){
        startRow = i + 1;
        break;
    }
}

if(startRow === -1){
    startRow = 10;
}

const scores = [];
for(let i = startRow; i < Math.min(startRow + 5, rows.length); i++){
    if(rows[i] && rows[i].length > 12){
        const score = Number(rows[i][12]) || 0;
        scores.push(score);
    }
}

// If no scores found, try to find any numeric data in column 13
if(scores.length === 0){
    for(let i = 0; i < rows.length; i++){
        if(rows[i] && rows[i].length > 12){
            const score = Number(rows[i][12]);
            if(!isNaN(score) && score > 0){
                scores.push(score);
                if(scores.length >= 5) break;
            }
        }
    }
}

// If still no scores, use zeros
while(scores.length < 5){
    scores.push(0);
}

const total = scores.slice(0,5).reduce((a,b)=>a+b,0);

results.push({
team:teamName,
score:total
});

}
catch(err){

console.error(
teamName,
err
);
results.push({
team:teamName,
score:0
});

}

}

results.sort(
(a,b)=>b.score-a.score
);

// Ensure we have 3 results
while(results.length < 3){
    results.push({
        team: `Team ${results.length + 1}`,
        score: 0
    });
}

document.getElementById("leaderboard")
.innerHTML =

`

<div class="winner-card first">

<div class="position">
🏆 CHAMPION
</div>

<div class="team-name-final">
${results[0].team}
</div>

<div class="team-score-final">
${results[0].score}
</div>

</div>

<div class="podium-row">

<div class="winner-card second">

<div class="position">
🥈 SECOND PLACE
</div>

<div class="team-name-final">
${results[1].team}
</div>

<div class="team-score-final">
${results[1].score}
</div>

</div>

<div class="winner-card third">

<div class="position">
🥉 THIRD PLACE
</div>

<div class="team-name-final">
${results[2].team}
</div>

<div class="team-score-final">
${results[2].score}
</div>

</div>

</div>

`;

// Remove side images if they exist
const sideElements = document.querySelectorAll(".side");
sideElements.forEach(el => el.style.display = "none");

celebrate();

}




function celebrate(){


setInterval(()=>{


confetti({

particleCount:80,

spread:100,

origin:{
y:.6
}

});


},2500);



}




if(isFinal){

showFinal();

setInterval(
showFinal,
1000
);

}

else{

loadTeam();

setInterval(
loadTeam,
1000
);

}



</script>

</body>

</html>
