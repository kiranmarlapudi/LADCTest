<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Conclave 2026 Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;
overflow:hidden;

font-family:'Segoe UI',sans-serif;

background:

radial-gradient(circle at top left,
rgba(139,92,246,.25),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(56,189,248,.20),
transparent 35%),

linear-gradient(
135deg,
#12081f,
#251341,
#102442
);

color:white;

}


/* HEADER */

.header{

text-align:center;

padding:15px;

}


.logo{

width:130px;
height:130px;

object-fit:contain;

margin:auto;

}


.title{

font-size:58px;

font-weight:800;

letter-spacing:3px;

margin-top:5px;

}


.team{

font-size:46px;

font-weight:700;

margin-top:10px;

}


.live{

color:#4ade80;

margin-top:8px;

font-size:14px;

}


.dot{

height:10px;
width:10px;

background:#4ade80;

display:inline-block;

border-radius:50%;

margin-right:8px;

}


/* SCORE */

.total{

text-align:center;

margin:10px;

}


.total-label{

opacity:.7;

font-size:14px;

}


.total-score{

font-size:42px;

font-weight:700;

color:#fbbf24;

}



/* MAIN */

.main{

display:flex;

justify-content:center;

align-items:center;

gap:25px;

width:98%;

margin:auto;

}



.side{

width:230px;

}



.side img{

width:100%;

height:500px;

object-fit:contain;

}



.chart-box{

height:560px;

flex:1;

background:
rgba(255,255,255,.05);

border-radius:25px;

padding:25px;

border:
1px solid rgba(255,255,255,.1);

}



canvas{

height:100%!important;
width:100%!important;

}



/* FINAL */

.leaderboard{
width:90%;
max-width:1200px;
margin:20px auto;
}

.first{
background:
linear-gradient(
135deg,
#fbbf24,
#f59e0b
);

color:#111;

padding:40px;

margin-bottom:25px;

border-radius:30px;
}

.podium-row{
display:flex;
gap:25px;
}

.second{
flex:1;

background:
linear-gradient(
135deg,
#cbd5e1,
#94a3b8
);

color:#111;

border-radius:30px;
}

.third{
flex:1;

background:
linear-gradient(
135deg,
#d97706,
#92400e
);

border-radius:30px;
}

.winner-card{
padding:35px;
text-align:center;
}

.position{
font-size:34px;
font-weight:800;
}

.team-name-final{
font-size:52px;
font-weight:800;
margin-top:15px;
}

.team-score-final{
font-size:88px;
font-weight:900;
margin-top:15px;
}


.footer{

position:fixed;

bottom:12px;

left:15px;

font-size:13px;

z-index:9999;

}

.footer a{

color:#c4b5fd;

text-decoration:none;

margin:0 6px;

font-weight:600;

transition:.2s;

}

.footer a:hover{

color:#ffffff;

text-shadow:
0 0 10px rgba(255,255,255,.6);

}



</style>

</head>


<body>


<div class="header">


<img id="logo"
class="logo">


<div class="title">
HR CONCLAVE 2026
</div>


<div id="teamName"
class="team">
TEAM 1
</div>


<div class="live">

<span class="dot"></span>

LIVE DASHBOARD

</div>


</div>



<div id="totalArea"
class="total">


<div class="total-label">
TOTAL SCORE
</div>


<div id="totalScore"
class="total-score">
0
</div>


</div>





<div id="normalView"
class="main">


<div class="side">

<img id="leftImage">

</div>


<div class="chart-box">

<canvas id="chart"></canvas>

</div>


<div class="side">

<img id="rightImage">

</div>


</div>





<div id="finalView"
style="display:none">


<div class="leaderboard"
id="leaderboard">

</div>


</div>




<div class="footer">

<a href="?team=1">Team 1</a>

|

<a href="?team=2">Team 2</a>

|

<a href="?team=3">Team 3</a>

|

<a href="?final=true">🏆 Final Scores</a>

</div>





<script>


/* ======================
   SETTINGS
====================== */


const SHEET_ID =
"1zfoi-RiQ2_djE64bg3DMQXD7KBaz0j8ko54tPrQ9nf8";



const EVENT_LOGO =
"https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/image5.png";


const LEFT_IMAGE =
"https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/image7.png";


const RIGHT_IMAGE =
"https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/image9.png";



document.getElementById("logo").src =
EVENT_LOGO;



document.getElementById("leftImage").src =
LEFT_IMAGE;



document.getElementById("rightImage").src =
RIGHT_IMAGE;



const params =
new URLSearchParams(
window.location.search
);



const isFinal =
params.get("final")==="true";
const currentTeam =
params.get("team");

window.addEventListener("load",()=>{

document.querySelectorAll(".footer a")
.forEach(link=>{

const href = link.getAttribute("href");

if(
(currentTeam==="1" && href.includes("team=1")) ||
(currentTeam==="2" && href.includes("team=2")) ||
(currentTeam==="3" && href.includes("team=3")) ||
(isFinal && href.includes("final=true"))
){
link.style.color="#fbbf24";
}
});

});


const selectedTeam =
params.get("team") || "1";



let chart;



/* ======================
 TEAM VIEW
====================== */


async function loadTeam(){


const sheetName =
"Team " + selectedTeam;



const url =

`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;



const response =
await fetch(
url+"&t="+Date.now()
);



const csv =
await response.text();



const rows =
csv.trim()
.split("\n")
.map(r=>
r.split(",")
.map(c=>c.replace(/"/g,"").trim())
);



const data =
rows.slice(10,15);



const labels =
data.map(r=>r[11]);



const scores =
data.map(r=>Number(r[12]));



const total =
scores.reduce((a,b)=>a+b,0);



document.getElementById("teamName")
.innerHTML =
"TEAM "+selectedTeam;



document.getElementById("totalScore")
.innerHTML =
total;



drawChart(labels,scores);



}




function drawChart(labels,scores){


if(chart)
chart.destroy();



chart =
new Chart(
document.getElementById("chart"),
{

type:"bar",

data:{


labels,


datasets:[{

data:scores,


backgroundColor:[

"#8b5cf6",
"#38bdf8",
"#f472b6",
"#34d399",
"#fbbf24"

],


borderRadius:18

}]

},



options:{


responsive:true,

maintainAspectRatio:false,


plugins:{


legend:{
display:false
}

},


scales:{


x:{


ticks:{
color:"#fff",
font:{
size:15
}
},

grid:{
display:false
}


},


y:{


beginAtZero:true,

max:100,


ticks:{
color:"#fff"
}


}


}


}


});



}



/* ======================
 FINAL PAGE - DYNAMIC
====================== */


async function showFinal(){

document.getElementById("normalView")
.style.display="none";

document.getElementById("totalArea")
.style.display="none";

document.getElementById("finalView")
.style.display="block";

document.getElementById("teamName")
.innerHTML =
"🏆 FINAL LEADERBOARD";

const teams = [
"Team 1",
"Team 2",
"Team 3"
];

const results = [];

for(const teamName of teams){

try{

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(teamName)}`;

const response =
await fetch(url + "&t=" + Date.now());

const csv =
await response.text();

const rows =
csv.trim()
.split("\n")
.map(r =>
r.split(",")
.map(c =>
c.replace(/"/g,"").trim()
)
);

const dataRows =
rows.slice(10,15);

const scores =
dataRows.map(r =>
Number(r[12]) || 0
);

const total =
scores.reduce(
(a,b)=>a+b,
0
);

results.push({
team:teamName,
score:total
});

}
catch(err){

console.error(
teamName,
err
);

}

}

results.sort(
(a,b)=>b.score-a.score
);

document.getElementById("leaderboard")
.innerHTML =

`

<div class="winner-card first">

<div class="position">
🏆 CHAMPION
</div>

<div class="team-name-final">
${results[0].team}
</div>

<div class="team-score-final">
${results[0].score}
</div>

</div>

<div class="podium-row">

<div class="winner-card second">

<div class="position">
🥈 SECOND PLACE
</div>

<div class="team-name-final">
${results[1].team}
</div>

<div class="team-score-final">
${results[1].score}
</div>

</div>

<div class="winner-card third">

<div class="position">
🥉 THIRD PLACE
</div>

<div class="team-name-final">
${results[2].team}
</div>

<div class="team-score-final">
${results[2].score}
</div>

</div>

</div>

`;

document.querySelector(".side")?.remove();

celebrate();

}




function celebrate(){


setInterval(()=>{


confetti({

particleCount:80,

spread:100,

origin:{
y:.6
}

});


},2500);



}




if(isFinal){

showFinal();

setInterval(
showFinal,
1000
);

}

else{

loadTeam();

setInterval(
loadTeam,
1000
);

}



</script>

</body>

</html>
