<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instant 2s Cluster Dashboard</title>
    <script type="text/javascript" src="https://gstatic.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); width: 85%; max-width: 900px; }
        #chart_div { width: 100%; height: 450px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Audience Feedback Live Clusters</h2>
    <div id="chart_div">Connecting to live feed...</div>
</div>

<script type="text/javascript">
    // Specific spreadsheet targets provided
    const SPREADSHEET_ID = '1zfoi-RiQ2_djE64bg3DMQXD7KBaz0j8ko54tPrQ9nf8';
    const SHEET_NAME = 'Form Responses 1'; 

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(initializeDashboard);

    let chart;
    let options;

    function initializeDashboard() {
        // Prepare layout rules once
        options = {
            title: 'Real-Time Evaluation Metrics',
            bars: 'vertical',
            groupWidth: '70%',
            vAxis: { title: 'Scores (1-5)', minValue: 0, maxValue: 5 },
            hAxis: { title: 'Timeline / Submissions' },
            colors: ['#4285F4', '#EA4335', '#FBBC05'], // Custom cluster colors
            animation: { duration: 400, easing: 'out' } // Fluid motion on transition updates
        };
        
        chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
        
        // Execute initial fetch, then repeat query every 2 seconds
        refreshData();
        setInterval(refreshData, 2000); 
    }

    function refreshData() {
        // Appending a random query parameter 't=' destroys any API endpoint caching downstream
        const queryUrl = `https://google.com{SPREADSHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tq=SELECT*&headers=1&t=${new Date().getTime()}`;
        const query = new google.visualization.Query(queryUrl);
        query.send(handleResponse);
    }

    function handleResponse(response) {
        if (response.isError()) {
            console.error(response.getDetailedMessage());
            return;
        }
        const dataTable = response.getDataTable();
        // Redraws the cluster canvas instantly using the newest rows
        chart.draw(dataTable, options);
    }
</script>
</body>
</html>
