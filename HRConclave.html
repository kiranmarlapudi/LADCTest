<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Conclave 2026 - Team 1 Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
height:100vh;
overflow:hidden;

background:
radial-gradient(circle at top left,
rgba(139,92,246,.20),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(56,189,248,.15),
transparent 35%),

linear-gradient(
135deg,
#12081f 0%,
#24123f 45%,
#112442 100%);

color:white;
}

/* HEADER */

.header{
text-align:center;
padding:15px 20px 5px;
}

.event-logo{
width:140px;
height:140px;
object-fit:contain;
display:block;
margin:auto;
margin-bottom:10px;
}

.badge{

display:inline-block;

padding:12px 28px;

border-radius:999px;

background:rgba(139,92,246,.15);

border:1px solid rgba(139,92,246,.35);

color:#c4b5fd;

font-size:28px;

font-weight:700;

letter-spacing:3px;
}

.team-title{
font-size:52px;
font-weight:700;
margin-top:12px;
}

.live{
margin-top:10px;
font-size:14px;
color:#4ade80;
}

.live-dot{
display:inline-block;
width:10px;
height:10px;
border-radius:50%;
background:#4ade80;
margin-right:8px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

/* TOTAL SCORE */

.total-box{
text-align:center;
margin-top:8px;
margin-bottom:10px;
}

.total-label{
font-size:14px;
opacity:.7;
}

.total-score{
font-size:42px;
font-weight:700;
color:#fbbf24;
}

/* MAIN DASHBOARD */

.dashboard-row{

display:flex;

align-items:center;

justify-content:center;

gap:20px;

width:98%;

margin:auto;
}

/* SIDE PANELS */

.side-panel{

width:240px;

display:flex;

align-items:center;

justify-content:center;
}

.side-image{

width:100%;

height:520px;

object-fit:contain;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

border-radius:20px;

padding:10px;
}

/* CHART */

.chart-card{

flex:1;

height:620px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

border-radius:24px;

padding:20px;

backdrop-filter:blur(12px);
}

canvas{
width:100% !important;
height:100% !important;
}

.footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

</style>
</head>

<body>

<div class="header">

<img
id="eventLogo"
class="event-logo"
src=""
alt="Logo"
>

<div class="badge">
HR CONCLAVE 2026
</div>

<div class="team-title">
TEAM 1
</div>

<div class="live">
<span class="live-dot"></span>
LIVE SCORING
</div>

</div>

<div class="total-box">

<div class="total-label">
TOTAL SCORE
</div>

<div
id="totalScore"
class="total-score">
0
</div>

</div>

<div class="dashboard-row">

<div class="side-panel">
<img
id="leftImage"
class="side-image"
src=""
alt="Left Image">
</div>

<div class="chart-card">
<canvas id="scoreChart"></canvas>
</div>

<div class="side-panel">
<img
id="rightImage"
class="side-image"
src=""
alt="Right Image">
</div>

</div>

<div class="footer">
Auto Refreshing Every Second
</div>

<script>

/* ==========================
   IMAGE URLS
   Replace these with your
   GitHub RAW image links
========================== */

const EVENT_LOGO = " https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/image5.png";
const LEFT_IMAGE = " https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/image7.png";
const RIGHT_IMAGE = "https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/image9.png";



/* ==========================
   GOOGLE SHEET
========================== */

const SHEET_ID =
"1zfoi-RiQ2_djE64bg3DMQXD7KBaz0j8ko54tPrQ9nf8";

const SHEET_NAME =
"Team 1";

document.getElementById("eventLogo").src =
EVENT_LOGO;

document.getElementById("leftImage").src =
LEFT_IMAGE;

document.getElementById("rightImage").src =
RIGHT_IMAGE;

let chart = null;

async function loadData(){

try{

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

const response =
await fetch(
url + "&nocache=" + Date.now()
);

const csv =
await response.text();

const rows =
csv
.trim()
.split("\n")
.map(row =>
row
.split(",")
.map(cell =>
cell.replace(/"/g,"").trim()
)
);

/*
L11:M15

L = column 11
M = column 12

Row 11 = index 10
Row 15 = index 14
*/

const dataRows =
rows.slice(10,15);

const labels =
dataRows.map(
r => r[11]
);

const scores =
dataRows.map(
r => Number(r[12]) || 0
);

const total =
scores.reduce(
(a,b)=>a+b,
0
);

document.getElementById(
"totalScore"
).innerText = total;

renderChart(
labels,
scores
);

}
catch(err){

console.error(err);

}

}

function renderChart(
labels,
scores
){

const ctx =
document.getElementById(
"scoreChart"
);

if(chart){
chart.destroy();
}

chart =
new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

data:scores,

backgroundColor:[
"#8b5cf6",
"#38bdf8",
"#f472b6",
"#34d399",
"#fbbf24"
],

borderRadius:18,
borderSkipped:false

}]
},

options:{

responsive:true,
maintainAspectRatio:false,

plugins:{
legend:{
display:false
}
},

scales:{

x:{

ticks:{
color:"#ffffff",
font:{
size:15,
weight:"bold"
}
},

grid:{
display:false
}
},

y:{

beginAtZero:true,

max:
Math.max(...scores)+10,

ticks:{
color:"#ffffff",
font:{
size:14
}
},

grid:{
color:
"rgba(255,255,255,.08)"
}
}
}
},

plugins:[{

id:"valueLabels",

afterDatasetsDraw(chart){

const {ctx} = chart;

ctx.save();

ctx.fillStyle =
"#ffffff";

ctx.font =
"bold 20px Segoe UI";

chart
.getDatasetMeta(0)
.data
.forEach((bar,index)=>{

ctx.textAlign =
"center";

ctx.fillText(
scores[index],
bar.x,
bar.y - 12
);

});

ctx.restore();
}
}]
});

}

loadData();

setInterval(
loadData,
1000
);

</script>

</body>
</html>
