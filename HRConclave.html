<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HR Conclave Scoreboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(
        135deg,
        #1a0a2e 0%,
        #2d1b4e 45%,
        #1a2a4a 100%
    );
    color:white;
    min-height:100vh;
}

.header{
    text-align:center;
    padding:25px;
}

.header h1{
    font-size:34px;
}

.header span{
    color:#a78bfa;
}

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
}

.controls{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
    flex-wrap:wrap;
}

input{
    width:500px;
    max-width:90%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:rgba(255,255,255,0.1);
    color:white;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#8b5cf6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#7c3aed;
}

.score-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    padding:20px;
    text-align:center;
}

.card.gold{
    border-color:#fbbf24;
}

.rank{
    font-size:14px;
    opacity:.7;
}

.team{
    font-size:18px;
    margin-top:10px;
    font-weight:bold;
}

.points{
    font-size:32px;
    color:#a78bfa;
    margin-top:10px;
}

.gold .points{
    color:#fbbf24;
}

.chart-box{
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    padding:20px;
}

.chart-container{
    height:500px;
}
</style>
</head>

<body>

<div class="header">
    <h1>🏆 HR Conclave <span>Scoreboard</span></h1>
</div>

<div class="container">

    <div class="controls">
        <input
            id="sheetUrl"
            value="https://docs.google.com/spreadsheets/d/1AaSU85vaMCaaFta1Nxq_HIy48BRkbXLcgzWTqNiVx_o/edit?usp=sharing"
        >
        <button onclick="loadSheet()">Load Sheet</button>
    </div>

    <div id="scoreGrid" class="score-grid"></div>

    <div class="chart-box">
        <div class="chart-container">
            <canvas id="hrChart"></canvas>
        </div>
    </div>

</div>

<script>

let chartInstance = null;

const COLORS = [
    '#8b5cf6',
    '#38bdf8',
    '#f472b6',
    '#34d399',
    '#fb923c',
    '#fbbf24'
];

function renderLeaderboard(data){

    const totals = data.teams.map((team,index)=>{

        const total = data.scores[index]
            .reduce((a,b)=>a+b,0);

        return {
            team,
            total
        };

    });

    totals.sort((a,b)=>b.total-a.total);

    const medals = ['🥇','🥈','🥉'];

    document.getElementById("scoreGrid").innerHTML =
        totals.map((row,index)=>{

            return `
                <div class="card ${index===0 ? 'gold':''}">
                    <div style="font-size:30px">
                        ${medals[index] || '🏅'}
                    </div>

                    <div class="rank">
                        Rank #${index+1}
                    </div>

                    <div class="team">
                        ${row.team}
                    </div>

                    <div class="points">
                        ${row.total}
                    </div>
                </div>
            `;

        }).join("");

}

function renderChart(data){

    const ctx =
        document.getElementById("hrChart")
        .getContext("2d");

    if(chartInstance){
        chartInstance.destroy();
    }

    const datasets =
        data.categories.map((category,index)=>{

            return {
                label:category,
                data:data.scores.map(
                    row=>row[index]
                ),
                backgroundColor:
                    COLORS[index % COLORS.length],
                borderRadius:5
            };

        });

    const maxValue =
        Math.max(...data.scores.flat());

    chartInstance =
        new Chart(ctx,{

            type:'bar',

            data:{
                labels:data.teams,
                datasets
            },

            options:{

                responsive:true,

                maintainAspectRatio:false,

                plugins:{
                    legend:{
                        labels:{
                            color:'white'
                        }
                    }
                },

                scales:{

                    x:{
                        ticks:{
                            color:'white'
                        },
                        grid:{
                            color:'rgba(255,255,255,0.05)'
                        }
                    },

                    y:{
                        beginAtZero:true,
                        max:maxValue + 1,

                        ticks:{
                            stepSize:1,
                            color:'white'
                        },

                        grid:{
                            color:'rgba(255,255,255,0.08)'
                        }
                    }
                }
            }
        });

    renderLeaderboard(data);
}

async function loadSheet(){

    const url =
        document.getElementById("sheetUrl")
        .value.trim();

    const match =
        url.match(/\/d\/([a-zA-Z0-9_-]+)/);

    if(!match){

        alert("Invalid Google Sheet URL");
        return;
    }

    const sheetId = match[1];

    const csvUrl =
        `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    try{

        const response =
            await fetch(csvUrl);

        if(!response.ok){

            throw new Error(
                "Unable to access sheet. Make sure sharing is set to 'Anyone with link can view'."
            );
        }

        const csv =
            await response.text();

        const rows =
            csv.trim()
               .split('\n')
               .map(row =>
                    row.split(',')
                       .map(cell =>
                            cell
                            .replace(/^"|"$/g,'')
                            .trim()
                       )
               );

        const headers = rows[0];

        const categories =
            headers.slice(1);

        const teams =
            rows.slice(1)
                .map(row =>
                    "Team " + row[0]
                );

        const scores =
            rows.slice(1)
                .map(row =>
                    row.slice(1)
                       .map(value =>
                            Number(value) || 0
                       )
                );

        renderChart({
            teams,
            categories,
            scores
        });

    }
    catch(error){

        console.error(error);

        alert(
            "Error: " +
            error.message
        );
    }
}

loadSheet();

</script>

</body>
</html>
