<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Conclave - Team 1 Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
height:100vh;
overflow:hidden;

background:
radial-gradient(circle at top left,
rgba(139,92,246,.20),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(56,189,248,.15),
transparent 35%),

linear-gradient(
135deg,
#12081f 0%,
#24123f 45%,
#112442 100%);

color:white;
}

.header{
text-align:center;
padding:25px 20px 10px;
}

.badge{
display:inline-block;
padding:6px 18px;
border-radius:999px;
background:rgba(139,92,246,.15);
border:1px solid rgba(139,92,246,.35);
color:#c4b5fd;
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
}

.team-title{
font-size:54px;
font-weight:700;
margin-top:10px;
}

.live{
margin-top:10px;
font-size:14px;
color:#4ade80;
}

.live-dot{
display:inline-block;
width:10px;
height:10px;
border-radius:50%;
background:#4ade80;
margin-right:8px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

.total-box{
text-align:center;
margin-top:15px;
margin-bottom:20px;
}

.total-label{
font-size:14px;
opacity:.7;
}

.total-score{
font-size:64px;
font-weight:700;
color:#fbbf24;
}

.chart-card{

width:95%;
height:600px;

margin:auto;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

border-radius:24px;

padding:25px;

backdrop-filter:blur(12px);
}

canvas{
width:100% !important;
height:100% !important;
}

.footer{
position:fixed;
bottom:12px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}

</style>
</head>

<body>

<div class="header">

<div class="badge">
HR CONCLAVE 2025
</div>

<div class="team-title">
TEAM 1
</div>

<div class="live">
<span class="live-dot"></span>
LIVE SCORING
</div>

</div>

<div class="total-box">
<div class="total-label">
TOTAL SCORE
</div>

<div id="totalScore" class="total-score">
0
</div>
</div>

<div class="chart-card">
<canvas id="scoreChart"></canvas>
</div>

<div class="footer">
Auto Refreshing Every Second
</div>

<script>

const SHEET_ID =
"1zfoi-RiQ2_djE64bg3DMQXD7KBaz0j8ko54tPrQ9nf8";

const SHEET_NAME =
"Team 1";

let chart = null;

async function loadData(){

try{

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

const response =
await fetch(
url + "&t=" + Date.now()
);

const csv =
await response.text();

const rows =
csv
.trim()
.split("\n")
.map(row =>
row
.split(",")
.map(cell =>
cell.replace(/"/g,"").trim()
)
);

/*
L11:M15

L column = index 11
M column = index 12

Row 11 = index 10
Row 15 = index 14
*/

const dataRows =
rows.slice(10,15);

const labels =
dataRows.map(
r => r[11]
);

const scores =
dataRows.map(
r => Number(r[12]) || 0
);

const total =
scores.reduce(
(a,b)=>a+b,
0
);

document
.getElementById("totalScore")
.innerText = total;

renderChart(
labels,
scores
);

}
catch(err){

console.error(err);

}
}

function renderChart(
labels,
scores
){

const ctx =
document.getElementById("scoreChart");

if(chart){
chart.destroy();
}

chart =
new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

data:scores,

backgroundColor:[
"#8b5cf6",
"#38bdf8",
"#f472b6",
"#34d399",
"#fbbf24"
],

borderRadius:18,
borderSkipped:false

}]
},

options:{

responsive:true,
maintainAspectRatio:false,

plugins:{
legend:{
display:false
}
},

scales:{

x:{

ticks:{
color:"#ffffff",
font:{
size:14,
weight:"bold"
}
},

grid:{
display:false
}
},

y:{

beginAtZero:true,

max:
Math.max(...scores)+10,

ticks:{
color:"#ffffff"
},

grid:{
color:
"rgba(255,255,255,.08)"
}
}
}
},

plugins:[{

id:"valueLabels",

afterDatasetsDraw(chart){

const {ctx} = chart;

ctx.save();

ctx.fillStyle =
"#ffffff";

ctx.font =
"bold 18px Segoe UI";

chart
.getDatasetMeta(0)
.data
.forEach((bar,index)=>{

ctx.textAlign =
"center";

ctx.fillText(
scores[index],
bar.x,
bar.y - 12
);

});

ctx.restore();

}
}]
});

}

loadData();

setInterval(
loadData,
1000
);

</script>

</body>
</html>
