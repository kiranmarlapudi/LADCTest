<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Conclave 2026 Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;
overflow:hidden;

font-family:'Segoe UI',sans-serif;

background:

radial-gradient(circle at top left,
rgba(139,92,246,.25),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(56,189,248,.20),
transparent 35%),

linear-gradient(
135deg,
#12081f,
#251341,
#102442
);

color:white;

}


/* HEADER */

.header{

text-align:center;

padding:15px;

}


.logo{

width:130px;
height:130px;

object-fit:contain;

margin:auto;

}


.title{

font-size:58px;

font-weight:800;

letter-spacing:3px;

margin-top:5px;

}


.team{

font-size:46px;

font-weight:700;

margin-top:10px;

}


.live{

color:#4ade80;

margin-top:8px;

font-size:14px;

}


.dot{

height:10px;
width:10px;

background:#4ade80;

display:inline-block;

border-radius:50%;

margin-right:8px;

}


/* SCORE */

.total{

text-align:center;

margin:10px;

}


.total-label{

opacity:.7;

font-size:14px;

}


.total-score{

font-size:42px;

font-weight:700;

color:#fbbf24;

}



/* MAIN */

.main{

display:flex;

justify-content:center;

align-items:center;

gap:25px;

width:98%;

margin:auto;

}



.side{

width:230px;

}



.side img{

width:100%;

height:500px;

object-fit:contain;

}



.chart-box{

height:560px;

flex:1;

background:
rgba(255,255,255,.05);

border-radius:25px;

padding:25px;

border:
1px solid rgba(255,255,255,.1);

}



canvas{

height:100%!important;
width:100%!important;

}



/* FINAL */

.leaderboard{

width:700px;

margin:30px auto;

}


.rank-card{

display:flex;

justify-content:space-between;

align-items:center;

background:
rgba(255,255,255,.08);

padding:25px;

margin:15px;

border-radius:20px;

font-size:30px;

}


.rank{

font-size:40px;

}


.points{

color:#fbbf24;

font-weight:700;

}


.footer{

position:fixed;

bottom:12px;

left:15px;

font-size:13px;

z-index:9999;

}

.footer a{

color:#c4b5fd;

text-decoration:none;

margin:0 6px;

font-weight:600;

transition:.2s;

}

.footer a:hover{

color:#ffffff;

text-shadow:
0 0 10px rgba(255,255,255,.6);

}



</style>

</head>


<body>


<div class="header">


<img id="logo"
class="logo">


<div class="title">
HR CONCLAVE 2026
</div>


<div id="teamName"
class="team">
TEAM 1
</div>


<div class="live">

<span class="dot"></span>

LIVE DASHBOARD

</div>


</div>



<div id="totalArea"
class="total">


<div class="total-label">
TOTAL SCORE
</div>


<div id="totalScore"
class="total-score">
0
</div>


</div>





<div id="normalView"
class="main">


<div class="side">

<img id="leftImage">

</div>


<div class="chart-box">

<canvas id="chart"></canvas>

</div>


<div class="side">

<img id="rightImage">

</div>


</div>





<div id="finalView"
style="display:none">


<div class="leaderboard"
id="leaderboard">

</div>


</div>




<div class="footer">

<a href="?team=1">Team 1</a>

|

<a href="?team=2">Team 2</a>

|

<a href="?team=3">Team 3</a>

|

<a href="?final=true">🏆 Final Scores</a>

</div>





<script>


/* ======================
   SETTINGS
====================== */


const SHEET_ID =
"1zfoi-RiQ2_djE64bg3DMQXD7KBaz0j8ko54tPrQ9nf8";



const EVENT_LOGO =
"https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/image5.png";


const LEFT_IMAGE =
"https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/image7.png";


const RIGHT_IMAGE =
"https://raw.githubusercontent.com/kiranmarlapudi/LADCTest/main/image9.png";



document.getElementById("logo").src =
EVENT_LOGO;



document.getElementById("leftImage").src =
LEFT_IMAGE;



document.getElementById("rightImage").src =
RIGHT_IMAGE;



const params =
new URLSearchParams(
window.location.search
);



const isFinal =
params.get("final")==="true";
const currentTeam =
params.get("team");

window.addEventListener("load",()=>{

document.querySelectorAll(".footer a")
.forEach(link=>{

const href = link.getAttribute("href");

if(
(currentTeam==="1" && href.includes("team=1")) ||
(currentTeam==="2" && href.includes("team=2")) ||
(currentTeam==="3" && href.includes("team=3")) ||
(isFinal && href.includes("final=true"))
){
link.style.color="#fbbf24";
}
});

});


const selectedTeam =
params.get("team") || "1";



let chart;



/* ======================
 TEAM VIEW
====================== */


async function loadTeam(){


const sheetName =
"Team " + selectedTeam;



const url =

`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;



const response =
await fetch(
url+"&t="+Date.now()
);



const csv =
await response.text();



const rows =
csv.trim()
.split("\n")
.map(r=>
r.split(",")
.map(c=>c.replace(/"/g,"").trim())
);



const data =
rows.slice(10,15);



const labels =
data.map(r=>r[11]);



const scores =
data.map(r=>Number(r[12]));



const total =
scores.reduce((a,b)=>a+b,0);



document.getElementById("teamName")
.innerHTML =
"TEAM "+selectedTeam;



document.getElementById("totalScore")
.innerHTML =
total;



drawChart(labels,scores);



}




function drawChart(labels,scores){


if(chart)
chart.destroy();



chart =
new Chart(
document.getElementById("chart"),
{

type:"bar",

data:{


labels,


datasets:[{

data:scores,


backgroundColor:[

"#8b5cf6",
"#38bdf8",
"#f472b6",
"#34d399",
"#fbbf24"

],


borderRadius:18

}]

},



options:{


responsive:true,

maintainAspectRatio:false,


plugins:{


legend:{
display:false
}

},


scales:{


x:{


ticks:{
color:"#fff",
font:{
size:15
}
},

grid:{
display:false
}


},


y:{


beginAtZero:true,

max:100,


ticks:{
color:"#fff"
}


}


}


}


});



}



/* ======================
 FINAL PAGE
====================== */


function showFinal(){


document.getElementById("normalView")
.style.display="none";


document.getElementById("totalArea")
.style.display="none";


document.getElementById("finalView")
.style.display="block";



document.getElementById("teamName")
.innerHTML =
"FINAL LEADERBOARD";



const scores=[

{
team:"Team 1",
score:299
},

{
team:"Team 2",
score:318
},

{
team:"Team 3",
score:281
}

];



scores.sort(
(a,b)=>b.score-a.score
);



const medals=[
"🥇",
"🥈",
"🥉"
];



document.getElementById("leaderboard")
.innerHTML =

scores.map((x,i)=>`

<div class="rank-card">

<div>

<span class="rank">

${medals[i]}

</span>

${x.team}

</div>


<div class="points">

${x.score}

</div>


</div>

`).join("");



celebrate();



}




function celebrate(){


setInterval(()=>{


confetti({

particleCount:80,

spread:100,

origin:{
y:.6
}

});


},2500);



}




if(isFinal){

showFinal();

}

else{

loadTeam();

setInterval(
loadTeam,
1000
);

}



</script>


</body>

</html>
